<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Муринский переводчик</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { darkMode: 'class' }
</script>

<style>
body { transition: background 0.3s, color 0.3s; }
</style>
</head>

<body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-white">

<div class="max-w-4xl mx-auto p-6">

<h1 class="text-4xl font-bold text-center mb-8">
Муринский переводчик
</h1>

<div class="flex gap-3 flex-wrap mb-4">

<button onclick="toggleTheme()" class="px-4 py-2 rounded-2xl bg-gray-600 text-white">
🌙 Тёмная тема
</button>

<button onclick="clearText()" class="px-4 py-2 rounded-2xl bg-red-600 text-white">
🧹 Очистить
</button>

<button onclick="openDictionary()" class="px-4 py-2 rounded-2xl bg-blue-600 text-white">
📚 Словарь
</button>

</div>

<div class="grid md:grid-cols-2 gap-4">

<div>
<p class="font-semibold mb-1">Русский</p>
<textarea id="input"
class="w-full h-40 p-3 rounded-2xl bg-gray-100 dark:bg-gray-700"></textarea>
<button onclick="copyText('input')"
class="mt-2 px-3 py-1 rounded-xl bg-gray-500 text-white text-sm">
Копировать
</button>
</div>

<div>
<p class="font-semibold mb-1">Муринский</p>
<textarea id="output"
readonly
class="w-full h-40 p-3 rounded-2xl bg-gray-200 dark:bg-gray-600"></textarea>
<button onclick="copyText('output')"
class="mt-2 px-3 py-1 rounded-xl bg-gray-500 text-white text-sm">
Копировать
</button>
</div>

</div>

</div>

<!-- СЛОВАРЬ -->
<div id="dict"
class="fixed inset-0 bg-black/50 hidden items-center justify-center">

<div class="bg-white dark:bg-gray-800 p-6 rounded-2xl max-w-md w-full">

<div class="flex justify-between items-center mb-4">
<h2 class="text-xl font-bold">Словарь</h2>
<button onclick="closeDictionary()">✖</button>
</div>

<div class="space-y-1 text-sm">
<div>друг → друн</div>
<div>я → ч</div>
<div>дед → дод</div>
<div>батя → батч</div>
<div>жена → жинка</div>
<div>сын → сыр</div>
<div>кто → кьо</div>
<div>что → чьо</div>
</div>

</div>
</div>

<script>

// ===== ИСКЛЮЧЕНИЯ =====
const dictionary = {
  друг: "друн",
  я: "ч",
  дед: "дод",
  батя: "батч",
  жена: "жинка",
  сын: "сыр",
  кто: "кьо",
  что: "чьо"
};

// ===== ПЕРЕВОД =====
function translate(text){
  return text.split(/(\s+)/).map(word=>{
    let lower = word.toLowerCase();

    if(dictionary[lower]){
      return dictionary[lower];
    }

    if(word.length <= 1) return word;

    return word + "ость";
  }).join("");
}

document.getElementById("input").addEventListener("input", e=>{
  let value = e.target.value;
  document.getElementById("output").value = translate(value);
  localStorage.setItem("murino_text", value);
});

// ===== АВТОЗАГРУЗКА =====
window.onload = ()=>{
  let saved = localStorage.getItem("murino_text");
  if(saved){
    document.getElementById("input").value = saved;
    document.getElementById("output").value = translate(saved);
  }
};

// ===== КОПИРОВАНИЕ =====
function copyText(id){
  navigator.clipboard.writeText(document.getElementById(id).value);
}

// ===== ТЁМНАЯ ТЕМА =====
function toggleTheme(){
  document.documentElement.classList.toggle("dark");
}

// ===== ОЧИСТКА =====
function clearText(){
  document.getElementById("input").value = "";
  document.getElementById("output").value = "";
  localStorage.removeItem("murino_text");
}

// ===== СЛОВАРЬ =====
function openDictionary(){
  document.getElementById("dict").classList.remove("hidden");
  document.getElementById("dict").classList.add("flex");
}

function closeDictionary(){
  document.getElementById("dict").classList.add("hidden");
}

</script>

</body>
</html>
