<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Муринский переводчик</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:30px;
text-align:center;
transition:0.3s;
}

.dark{
background:#1e1e1e;
color:white;
}

.container{
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:120px;
margin-top:10px;
padding:15px;
border-radius:12px;
border:1px solid #ccc;
font-size:16px;
resize:none;
}

button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;
}

.top{
display:flex;
justify-content:space-between;
flex-wrap:wrap;
}

.panel{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.dark .panel{
background:#2a2a2a;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:20px;
border-radius:12px;
width:350px;
max-height:400px;
overflow:auto;
}

.dark .modalContent{
background:#2a2a2a;
}

.language{
padding:6px;
cursor:pointer;
}

.language:hover{
background:#eee;
}

.dark .language:hover{
background:#444;
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Муринский переводчик</h1>

<div class="panel">

<p id="rusLabel">Русский</p>
<textarea id="input"></textarea>

<div>
<button onclick="copyInput()">Копировать</button>
<button onclick="clearText()">Очистить</button>
</div>

<p id="murLabel">Муринский</p>
<textarea id="output" readonly></textarea>

<div>
<button onclick="copyOutput()">Копировать</button>
<button onclick="openDict()">📚 Словарь</button>
<button onclick="openSettings()">⚙️ Настройки</button>
<input type="file" id="photo" hidden>
<button onclick="document.getElementById('photo').click()">📷 Фото</button>
</div>

</div>

</div>

<!-- СЛОВАРЬ -->
<div class="modal" id="dictionary">

<div class="modalContent">

<h3>Словарь</h3>

<div id="dictWords"></div>

<button onclick="closeDict()">Закрыть</button>

</div>

</div>

<!-- НАСТРОЙКИ -->
<div class="modal" id="settings">

<div class="modalContent">

<h3>Настройки</h3>

<button onclick="toggleDark()">🌙 Тёмная тема</button>

<h4>Язык сайта</h4>

<input placeholder="поиск языка" id="langSearch">

<div id="langs"></div>

<button onclick="resetLang()">Сбросить язык</button>
<button onclick="closeSettings()">Закрыть</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>

// слова исключения
const exceptions={
"я":"ч",
"друг":"друн",
"дед":"дод",
"батя":"батч",
"жена":"жинка",
"сын":"сыр",
"кто":"кьо",
"что":"чьо"
}

// словарь
const dictionary=[
"мама","папа","дом","школа","город","еда","вода","кот",
"собака","телефон","компьютер","интернет","машина",
"игра","фильм","музыка","книга","работа","деньги",
"любовь","жизнь","ночь","день","солнце","луна","звезда"
]

const input=document.getElementById("input")
const output=document.getElementById("output")

// перевод
function translate(text){

let words=text.split(/(\s+)/)

return words.map(w=>{

let lw=w.toLowerCase()

if(exceptions[lw]) return exceptions[lw]

if(lw.length<=1) return w

return w+"ость"

}).join("")

}

// запрет иностранного текста
input.addEventListener("input",()=>{

let value=input.value

if(/[^а-яА-ЯёЁ0-9\s.,!?]/.test(value)){
input.value=value.replace(/[^а-яА-ЯёЁ0-9\s.,!?]/g,"")
}

output.value=translate(input.value)

})

// копирование
function copyInput(){
navigator.clipboard.writeText(input.value)
}

function copyOutput(){
navigator.clipboard.writeText(output.value)
}

// очистить
function clearText(){
input.value=""
output.value=""
}

// тёмная тема
function toggleDark(){
document.body.classList.toggle("dark")
}

// словарь
function openDict(){

let box=document.getElementById("dictWords")
box.innerHTML=""

dictionary.forEach(w=>{
box.innerHTML+=w+" → "+w+"ость<br>"
})

for(let k in exceptions){
box.innerHTML+=k+" → "+exceptions[k]+"<br>"
}

document.getElementById("dictionary").style.display="flex"

}

function closeDict(){
document.getElementById("dictionary").style.display="none"
}

// настройки
function openSettings(){
document.getElementById("settings").style.display="flex"
}

function closeSettings(){
document.getElementById("settings").style.display="none"
}

// языки
const languages=[
"Русский","English","Deutsch","Français","Español","Italiano",
"Polski","Čeština","Українська","日本語","한국어","中文"
]

const langBox=document.getElementById("langs")
const search=document.getElementById("langSearch")

function renderLangs(list){

langBox.innerHTML=""

list.forEach(l=>{
let d=document.createElement("div")
d.className="language"
d.innerText=l
d.onclick=()=>alert("Язык интерфейса: "+l)
langBox.appendChild(d)
})

}

renderLangs(languages)

search.oninput=()=>{

let f=languages.filter(l=>l.toLowerCase().includes(search.value.toLowerCase()))
renderLangs(f)

}

// сброс языка
function resetLang(){
alert("Язык сброшен на русский")
}

// фото распознавание
document.getElementById("photo").addEventListener("change",async(e)=>{

let file=e.target.files[0]

if(!file)return

let result=await Tesseract.recognize(file,"rus")

input.value=result.data.text
output.value=translate(input.value)

})

</script>

</body>
</html>
