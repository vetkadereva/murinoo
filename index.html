<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Муринский ИИ Переводчик</title>
<style>
body {
    font-family: Arial;
    text-align: center;
    background: #eef2f7;
}
textarea {
    width: 85%;
    height: 130px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>
<body>

<h1>Муринский ИИ Переводчик 🤖</h1>

<textarea id="input" placeholder="Пиши текст..."></textarea>
<br>
<textarea id="output" placeholder="Перевод..." readonly></textarea>

<script>

// ===== ИСКЛЮЧЕНИЯ =====
const exceptions = {
    "я": "ч",
    "ты": "т",
    "что": "чьо",
    "кто": "кьо",
    "уже": "уде",
    "друг": "друн",
    "дед": "дод",
    "батя": "батч",
    "жена": "жинка",
    "колбаска": "колбаска"
};

// ===== УМНЫЙ ПЕРЕВОД =====
function translateWord(word) {

    let lower = word.toLowerCase();

    // если исключение
    if (exceptions[lower]) {
        return exceptions[lower];
    }

    // если слово короткое (1-2 буквы) — не трогаем
    if (word.length <= 2) {
        return word;
    }

    // если слово уже заканчивается на гласную — добавляем "ость"
    let vowels = ["а","е","ё","и","о","у","ы","э","ю","я"];
    let lastChar = word[word.length - 1].toLowerCase();

    if (vowels.includes(lastChar)) {
        return word + "сть";
    }

    // по умолчанию
    return word + "ость";
}

// ===== РЕАЛЬНОЕ ВРЕМЯ =====
document.getElementById("input").addEventListener("input", function() {

    let text = this.value;

    let words = text.split(/(\s+)/);

    let translated = words.map(word => {
        if (word.trim() === "") return word;
        return translateWord(word);
    });

    document.getElementById("output").value = translated.join("");
});

</script>

</body>
</html>
