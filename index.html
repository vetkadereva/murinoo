<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Муринский переводчик (альфа)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' }
</script>

<script src="https://unpkg.com/tesseract.js@v5.0.0/dist/tesseract.min.js"></script>
</head>

<body class="bg-white text-gray-800 dark:bg-[#1f2937] dark:text-white transition-colors duration-500">

<div class="max-w-5xl mx-auto p-4">

  <div class="flex justify-between items-center mb-4">
    <h1 class="text-3xl font-bold">Муринский переводчик <span class="text-sm opacity-70">(альфа)</span></h1>

    <div class="flex gap-2">
      <button id="dictBtn" class="px-4 py-2 rounded-2xl bg-blue-600 text-white">📚 Словарь</button>
      <button id="themeBtn" class="px-4 py-2 rounded-2xl bg-gray-600 text-white">🌙 Тема</button>
    </div>
  </div>

  <div class="flex items-center gap-2 mb-3">
    <label class="flex items-center gap-2">
      <input type="checkbox" id="aiMode">
      🤖 Режим ИИ
    </label>
  </div>

  <div class="grid md:grid-cols-2 gap-4">

    <!-- Русский -->
    <div>
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold">Русский</span>
        <button id="copyRus" class="text-sm px-3 py-1 rounded-xl bg-gray-500 text-white">Копировать</button>
      </div>
      <textarea id="input" class="w-full h-40 p-3 rounded-2xl text-black dark:text-white dark:bg-gray-700"></textarea>
    </div>

    <!-- Муринский -->
    <div>
      <div class="flex justify-between items-center mb-1">
        <span class="font-semibold">Муринский</span>
        <button id="copyMur" class="text-sm px-3 py-1 rounded-xl bg-gray-500 text-white">Копировать</button>
      </div>
      <textarea id="output" readonly class="w-full h-40 p-3 rounded-2xl bg-gray-100 dark:bg-gray-600"></textarea>
    </div>

  </div>

  <div class="mt-4 flex gap-3 flex-wrap">
    <button id="photoBtn" class="px-4 py-2 rounded-2xl bg-green-600 text-white">📷 Фото</button>
    <input type="file" id="fileInput" accept="image/*" hidden>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
  <div class="bg-white dark:bg-gray-800 p-6 rounded-2xl max-w-lg w-full max-h-[80vh] overflow-y-auto">
    <h2 class="text-xl font-bold mb-3">Словарь</h2>
    <pre id="dictContent" class="text-sm whitespace-pre-wrap"></pre>
    <div class="flex justify-end gap-2 mt-3">
      <button id="copyDict" class="px-4 py-2 rounded-xl bg-blue-600 text-white">Копировать</button>
      <button id="closeModal" class="px-4 py-2 rounded-xl bg-gray-500 text-white">Закрыть</button>
    </div>
  </div>
</div>

<script>

// ===== ИСКЛЮЧЕНИЯ =====
const exceptions = {
  "я":"ч",
  "ты":"т",
  "что":"чьо",
  "кто":"кьо",
  "друг":"друн",
  "дед":"дод",
  "батя":"батч",
  "жена":"жинка",
  "колбаска":"колбаска"
};

// ===== ПЕРЕВОД =====
function translate(text, aiMode){

  return text.split(/(\s+|[^\p{L}]+)/gu).map(word=>{
    
    if(!/^\p{L}+$/u.test(word)) return word;

    if(word.length===1) return word;

    let lower=word.toLowerCase();

    if(exceptions[lower]){
      let res=exceptions[lower];
      if(word[0]===word[0].toUpperCase())
        res=res.charAt(0).toUpperCase()+res.slice(1);
      return res;
    }

    if(!aiMode) return lower+"ость";

    // ИИ режим
    const vowels=["а","е","ё","и","о","у","ы","э","ю","я"];
    if(vowels.includes(lower.slice(-1))) return lower+"сть";
    return lower+"ость";

  }).join("");

}

// ===== ЭЛЕМЕНТЫ =====
const input=document.getElementById("input");
const output=document.getElementById("output");
const aiMode=document.getElementById("aiMode");

// авто перевод
input.addEventListener("input",()=>{
  output.value=translate(input.value, aiMode.checked);
});

// копирование
document.getElementById("copyRus").onclick=()=>navigator.clipboard.writeText(input.value);
document.getElementById("copyMur").onclick=()=>navigator.clipboard.writeText(output.value);

// тема
document.getElementById("themeBtn").onclick=()=>{
  document.documentElement.classList.toggle("dark");
};

// словарь
document.getElementById("dictBtn").onclick=()=>{
  document.getElementById("dictContent").textContent=JSON.stringify(exceptions,null,2);
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
};

document.getElementById("closeModal").onclick=()=>{
  document.getElementById("modal").classList.add("hidden");
};

document.getElementById("copyDict").onclick=()=>{
  navigator.clipboard.writeText(JSON.stringify(exceptions,null,2));
};

// ===== OCR =====
const fileInput=document.getElementById("fileInput");

document.getElementById("photoBtn").onclick=()=>{
  fileInput.click();
};

fileInput.addEventListener("change",async(e)=>{
  const file=e.target.files[0];
  if(!file) return;

  const worker=await Tesseract.createWorker("rus");
  const {data:{text}}=await worker.recognize(file);
  await worker.terminate();

  input.value=text;
  output.value=translate(text, aiMode.checked);
});

</script>

</body>
</html>
