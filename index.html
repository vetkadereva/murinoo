<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>Муринский переводчик</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:Arial;
background:#f8f9fa;
margin:0;
padding:30px;
transition:0.3s;
}

.dark{
background:#202124;
color:white;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.panel{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.box{
background:white;
border-radius:12px;
border:1px solid #dadce0;
padding:14px;
}

.dark .box{
background:#303134;
border-color:#5f6368;
}

textarea{
width:100%;
height:170px;
border:none;
resize:none;
font-size:16px;
outline:none;
background:transparent;
color:inherit;
}

button{
border:none;
background:#e8eaed;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin:4px;
}

.dark button{
background:#3c4043;
color:white;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:20px;
border-radius:12px;
width:380px;
max-height:400px;
overflow:auto;
position:relative;
}

.dark .modalBox{
background:#303134;
}

.close{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
font-size:18px;
}

.lang{
padding:6px;
cursor:pointer;
}

.lang:hover{
background:#eee;
}

.dark .lang:hover{
background:#444;
}

.counter{
position:fixed;
bottom:8px;
right:10px;
font-size:11px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Муринский переводчик</h1>

<div class="top">

<div>
<button onclick="openDict()" id="dictBtn">📚 Словарь</button>
<button onclick="openSettings()" id="setBtn">⚙️ Настройки</button>
<button onclick="toggleDark()">🌙</button>
</div>

<button onclick="clearText()" id="clearBtn">Очистить</button>

</div>

<div class="panel">

<div class="box">

<div id="rLabel">Русский</div>

<textarea id="input"></textarea>

<div>

<button onclick="copyInput()" id="copyR">Копировать</button>
<button onclick="openPhoto()" id="photoBtn">📷 Фото</button>
<button onclick="speakText(input.value)">🔊</button>
<button onclick="voice()">🎤</button>

</div>

</div>

<div class="box">

<div id="mLabel">Муринский</div>

<textarea id="output" readonly></textarea>

<div>

<button onclick="copyOutput()" id="copyM">Копировать</button>
<button onclick="speakText(output.value)">🔊</button>

</div>

</div>

</div>

<input type="file" id="photo" hidden>

</div>

<div class="counter" id="counter"></div>

<!-- словарь -->

<div class="modal" id="dictionary">
<div class="modalBox">

<div class="close" onclick="closeDict()">✕</div>

<h3 id="dictTitle">Словарь</h3>

<div id="dictList"></div>

</div>
</div>

<!-- настройки -->

<div class="modal" id="settings">
<div class="modalBox">

<div class="close" onclick="closeSettings()">✕</div>

<h3 id="settingsTitle">Настройки</h3>

<h4 id="langTitle">Язык сайта</h4>

<input id="langSearch" placeholder="поиск языка">

<div id="langs"></div>

<button onclick="resetLang()">Сбросить язык</button>

</div>
</div>

<script>

// исключения
const exceptions={
"я":"ч",
"друг":"друн",
"дед":"дод",
"батя":"батч",
"жена":"жинка",
"сын":"сыр",
"кто":"кьо",
"что":"чьо"
}

// перевод в муринский

function murinTranslate(text){

let words=text.split(/(\s+)/)

return words.map(w=>{

let lw=w.toLowerCase()

if(exceptions[lw]) return exceptions[lw]

if(lw.length<=1) return w

return w+"ость"

}).join("")

}

// основной переводчик

async function translateInterface(text,target){

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=${target}&dt=t&q=`+encodeURIComponent(text)

let r=await fetch(url)

let data=await r.json()

return data[0].map(x=>x[0]).join("")

}

// ввод

input.addEventListener("input",()=>{

let v=input.value

output.value=murinTranslate(v)

})

// копирование

function copyInput(){navigator.clipboard.writeText(input.value)}
function copyOutput(){navigator.clipboard.writeText(output.value)}

function clearText(){
input.value=""
output.value=""
}

// тёмная тема

function toggleDark(){
document.body.classList.toggle("dark")
}

// голос

function speakText(t){
let msg=new SpeechSynthesisUtterance(t)
msg.lang="ru-RU"
speechSynthesis.speak(msg)
}

// голосовой ввод

function voice(){

let rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

rec.lang="ru-RU"

rec.onresult=e=>{
input.value+=e.results[0][0].transcript
output.value=murinTranslate(input.value)
}

rec.start()

}

// фото

function openPhoto(){
photo.click()
}

photo.addEventListener("change",async e=>{

let file=e.target.files[0]

let result=await Tesseract.recognize(file,"rus")

input.value=result.data.text

output.value=murinTranslate(input.value)

})

// словарь

const dictWords=[
"мама","папа","дом","школа","кот","собака","телефон",
"компьютер","интернет","еда","вода","машина","игра",
"фильм","музыка","книга","деньги","работа","жизнь"
]

function openDict(){

let box=document.getElementById("dictList")

box.innerHTML=""

dictWords.forEach(w=>{
box.innerHTML+=w+" → "+w+"ость<br>"
})

for(let k in exceptions){
box.innerHTML+=k+" → "+exceptions[k]+"<br>"
}

dictionary.style.display="flex"

}

function closeDict(){dictionary.style.display="none"}

// настройки

function openSettings(){settings.style.display="flex"}
function closeSettings(){settings.style.display="none"}

// языки

const languages={
"Русский":"ru",
"English":"en",
"Deutsch":"de",
"Français":"fr",
"Español":"es",
"Italiano":"it",
"Polski":"pl",
"Čeština":"cs",
"日本語":"ja",
"中文":"zh",
"Українська":"uk"
}

const langsDiv=document.getElementById("langs")

function renderLangs(list){

langsDiv.innerHTML=""

list.forEach(l=>{

let d=document.createElement("div")

d.className="lang"
d.innerText=l

d.onclick=()=>setLang(l)

langsDiv.appendChild(d)

})

}

renderLangs(Object.keys(languages))

// смена языка

async function setLang(name){

let code=languages[name]

if(!code) return

let elements={
title:"Муринский переводчик",
dictBtn:"Словарь",
setBtn:"Настройки",
clearBtn:"Очистить",
photoBtn:"Фото",
copyR:"Копировать",
copyM:"Копировать",
rLabel:"Русский",
mLabel:"Муринский",
dictTitle:"Словарь",
settingsTitle:"Настройки",
langTitle:"Язык сайта"
}

for(let id in elements){

let text=elements[id]

let translated=await translateInterface(text,code)

document.getElementById(id).innerText=translated

}

}

// поиск языка

langSearch.addEventListener("input",()=>{

let v=langSearch.value.toLowerCase()

let filtered=Object.keys(languages).filter(l=>l.toLowerCase().includes(v))

renderLangs(filtered)

})

// сброс

function resetLang(){
location.reload()
}

// онлайн счётчик

function online(){

let n=Math.floor(Math.random()*120)+40

counter.innerText="online "+n

}

setInterval(online,3000)

online()

</script>

</body>
</html>
