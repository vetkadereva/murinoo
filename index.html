<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Murinsky Translate</title>

<style>

body{
font-family:Arial;
background:#f1f3f4;
margin:0;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.dark{
background:#202124;
color:white;
}

h1{
margin-bottom:30px;
}

.container{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
width:700px;
max-width:95%;
}

.dark .container{
background:#303134;
}

textarea{
width:100%;
height:120px;
resize:none;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1a73e8;
color:white;
margin:3px;
}

.small{
font-size:10px;
opacity:0.5;
margin-top:10px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
width:400px;
max-height:70vh;
overflow:auto;
display:none;
}

.dark .popup{
background:#303134;
}

.close{
float:right;
cursor:pointer;
font-size:18px;
}

</style>
</head>

<body>

<h1 id="title">Муринский переводчик</h1>

<div class="container">

<textarea id="input" placeholder="Введите текст"></textarea>

<textarea id="output" readonly></textarea>

<div>

<button onclick="copyText('input')">Копировать</button>
<button onclick="copyText('output')">Копировать</button>
<button onclick="clearText()">Очистить</button>

<button onclick="speak('input')">🔊</button>
<button onclick="speak('output')">🔊</button>

<button onclick="startVoice()">🎤</button>

</div>

<div>

<button onclick="openDict()">📚 Словарь</button>
<button onclick="openSettings()">⚙ Настройки</button>

</div>

</div>

<div class="small" id="users">online: 1</div>

<div id="dictionary" class="popup">

<div class="close" onclick="closeDict()">✖</div>

<h3>Словарь</h3>

<div id="dictlist"></div>

</div>

<div id="settings" class="popup">

<div class="close" onclick="closeSettings()">✖</div>

<h3>Настройки</h3>

<button onclick="toggleDark()">🌙 Тёмная тема</button>

<br><br>

<input id="searchLang" placeholder="Поиск языка">

<div id="langs"></div>

<br>

<button onclick="resetLang()">Сбросить язык</button>

</div>

<script>

const dictionary={
"друг":"друн",
"я":"йон",
"дед":"дедун",
"батя":"батюн",
"жена":"женун",
"сын":"сынун",
"кто":"ктун",
"что":"штун"
}

const input=document.getElementById("input")
const output=document.getElementById("output")

function translateWord(word){

let w=word.toLowerCase()

if(dictionary[w]) return dictionary[w]

if(w.length<=2) return word

return word+"ость"

}

function translate(text){

return text.split(" ").map(translateWord).join(" ")

}

input.addEventListener("input",()=>{

let t=input.value

output.value=translate(t)

localStorage.setItem("text",t)

})

window.onload=()=>{

let saved=localStorage.getItem("text")

if(saved){
input.value=saved
output.value=translate(saved)
}

updateDict()

fakeUsers()

}

function copyText(id){

navigator.clipboard.writeText(document.getElementById(id).value)

}

function clearText(){

input.value=""
output.value=""

localStorage.removeItem("text")

}

function openDict(){

document.getElementById("dictionary").style.display="block"

}

function closeDict(){

document.getElementById("dictionary").style.display="none"

}

function updateDict(){

let d=document.getElementById("dictlist")

d.innerHTML=""

for(let k in dictionary){

let div=document.createElement("div")

div.textContent=k+" — "+dictionary[k]

d.appendChild(div)

}

}

function openSettings(){

document.getElementById("settings").style.display="block"

}

function closeSettings(){

document.getElementById("settings").style.display="none"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function speak(id){

let text=document.getElementById(id).value

let speech=new SpeechSynthesisUtterance(text)

speech.lang="ru-RU"

speechSynthesis.speak(speech)

}

function startVoice(){

let rec=new webkitSpeechRecognition()

rec.lang="ru-RU"

rec.onresult=function(e){

input.value=e.results[0][0].transcript

input.dispatchEvent(new Event("input"))

}

rec.start()

}

function fakeUsers(){

setInterval(()=>{

let n=Math.floor(Math.random()*20)+1

document.getElementById("users").textContent="online: "+n

},4000)

}

const languages=[
"Русский","English","Deutsch","Français","Español",
"Italiano","Polski","Čeština","日本語","中文","Українська"
]

const langBox=document.getElementById("langs")
const search=document.getElementById("searchLang")

function drawLangs(list){

langBox.innerHTML=""

list.forEach(l=>{

let b=document.createElement("button")

b.textContent=l

b.onclick=()=>setLang(l)

langBox.appendChild(b)

})

}

drawLangs(languages)

search.addEventListener("input",()=>{

let q=search.value.toLowerCase()

drawLangs(languages.filter(l=>l.toLowerCase().includes(q)))

})

function setLang(l){

alert("Язык интерфейса: "+l)

}

function resetLang(){

alert("Язык сброшен на русский")

}

</script>

</body>
</html>
